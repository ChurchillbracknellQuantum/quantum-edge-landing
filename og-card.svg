<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="60%" stop-color="#0D0A00"/>
      <stop offset="100%" stop-color="#060400"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#FFE080"/>
      <stop offset="100%" stop-color="#E8A800"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F5C842"/>
      <stop offset="70%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </linearGradient>
    <filter id="goldShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#F5C842" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#F5C842" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Ambient gold glow left-center -->
  <ellipse cx="340" cy="315" rx="380" ry="300" fill="url(#goldGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#F5C842" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Globe wireframe decorative right -->
  <g opacity="0.08" stroke="#F5C842" stroke-width="1.5" fill="none" transform="translate(860,315)">
    <circle cx="0" cy="0" r="220"/>
    <circle cx="0" cy="0" r="220" transform="rotate(60)"/>
    <circle cx="0" cy="0" r="220" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="220" ry="80"/>
    <ellipse cx="0" cy="0" rx="220" ry="80" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="220" ry="80" transform="rotate(120)"/>
    <line x1="-220" y1="0" x2="220" y2="0"/>
    <line x1="0" y1="-220" x2="0" y2="220"/>
  </g>

  <!-- City pulse dots -->
  <circle cx="940" cy="220" r="5" fill="#F5C842" opacity="0.6"/>
  <circle cx="940" cy="220" r="10" fill="#F5C842" opacity="0.15"/>
  <circle cx="1020" cy="300" r="5" fill="#F5C842" opacity="0.6"/>
  <circle cx="1020" cy="300" r="10" fill="#F5C842" opacity="0.15"/>
  <circle cx="880" cy="360" r="4" fill="#F5C842" opacity="0.5"/>
  <circle cx="880" cy="360" r="8" fill="#F5C842" opacity="0.15"/>
  <circle cx="990" cy="400" r="4" fill="#F5C842" opacity="0.5"/>
  <circle cx="990" cy="400" r="8" fill="#F5C842" opacity="0.15"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentLine)"/>

  <!-- Left vertical gold bar -->
  <rect x="60" y="80" width="3" height="470" fill="#F5C842" opacity="0.5"/>

  <!-- Brand label -->
  <text x="84" y="112" font-family="Georgia, serif" font-size="13" font-weight="normal" letter-spacing="4" fill="#F5C842" opacity="0.7">QUANTUM EDGE TRADING</text>

  <!-- Main title -->
  <text x="84" y="220" font-family="Georgia, serif" font-size="82" font-weight="bold" fill="url(#titleGrad)" filter="url(#goldShadow)" letter-spacing="-1">TITAN</text>
  <text x="84" y="295" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#FFFFFF" letter-spacing="1">AutoTrader</text>

  <!-- Tagline -->
  <text x="84" y="350" font-family="Arial, sans-serif" font-size="20" fill="#CCCCCC" letter-spacing="0.5">Institutional-Grade MT5 Expert Advisor</text>
  <text x="84" y="378" font-family="Arial, sans-serif" font-size="20" fill="#CCCCCC" letter-spacing="0.5">FTMO &amp; FundedNext Compliant · One-Time Payment</text>

  <!-- Divider -->
  <rect x="84" y="408" width="580" height="1.5" fill="#F5C842" opacity="0.3"/>

  <!-- Stats row -->
  <g transform="translate(84, 440)">
    <text x="0" y="30" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#F5C842" filter="url(#softGlow)">79%</text>
    <text x="0" y="52" font-family="Arial, sans-serif" font-size="13" fill="#888888" letter-spacing="1">WIN RATE</text>
  </g>

  <g transform="translate(230, 440)">
    <text x="0" y="30" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#F5C842" filter="url(#softGlow)">17mo</text>
    <text x="0" y="52" font-family="Arial, sans-serif" font-size="13" fill="#888888" letter-spacing="1">BACKTESTED</text>
  </g>

  <g transform="translate(390, 440)">
    <text x="0" y="30" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#F5C842" filter="url(#softGlow)">5</text>
    <text x="0" y="52" font-family="Arial, sans-serif" font-size="13" fill="#888888" letter-spacing="1">FOREX PAIRS</text>
  </g>

  <g transform="translate(480, 440)">
    <text x="0" y="30" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#2DB87A" filter="url(#softGlow)">1.39%</text>
    <text x="0" y="52" font-family="Arial, sans-serif" font-size="13" fill="#888888" letter-spacing="1">MAX DRAWDOWN</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#000000" opacity="0.6"/>
  <text x="84" y="612" font-family="Arial, sans-serif" font-size="16" fill="#F5C842" letter-spacing="2">getquantumedgeai.com</text>

  <!-- One-time badge -->
  <rect x="980" y="590" width="170" height="28" rx="14" fill="#F5C842" opacity="0.12" stroke="#F5C842" stroke-width="1.5"/>
  <text x="1065" y="609" font-family="Arial, sans-serif" font-size="12" fill="#F5C842" text-anchor="middle" letter-spacing="1">ONE-TIME PAYMENT</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentLine)"/>
</svg>
